<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toyota AI Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="header">
  <h1><span class="red">Toyota</span> AI</h1>
</div>

  <div class="chat-window" id="chatWindow"></div>

  <div class="input-bar">
    <input type="text" id="userInput" placeholder="Ask about any Toyota model…" autocomplete="off"/>
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
